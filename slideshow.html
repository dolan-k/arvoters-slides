<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ARvoters — Slide show</title>
<!-- arvoters_slideshow  v1.2.0  (2026-07-14)
     One-slide-at-a-time full-window PDF viewer for the About-page decks.
     Exists because browser PDF viewers differ: Firefox has Presentation
     Mode, Safari has nothing. Renders via PDF.js in its OWN tab (no
     builder iframe -> fullscreen API works, incl. Mac Safari).

     v1.2.0: THE VIEWER HAD NO EXIT. Once you were in it there was no way
     back to the site — the operator had to KILL SAFARI to get out, which
     is not a thing a presenter can do on stage. Two fixes:
       (1) PERSISTENT EXIT control, top-right. NOT in the auto-hiding HUD:
           the HUD fades after 3s idle, and a presenter under stage lights
           needs the way out to be VISIBLE, not discoverable. It leaves
           fullscreen FIRST (navigating while fullscreen strands some
           browsers), then returns to arvoters.com — history.back() when we
           came from there (preserves scroll position), else a direct URL.
           Keyboard: Q leaves the viewer. Esc stays NATIVE (it exits
           fullscreen) and is deliberately NOT intercepted — hijacking Esc
           would take away the one key every presenter already trusts.
       (2) END CARD past the last slide instead of dead air. Advancing off
           the end used to do NOTHING (go() clamped), so the deck just
           stopped and the presenter was left tapping at a frozen slide.
           Now: deck title + a large "Return to ARvoters.com" + a way back
           to review the slides.

     v1.1.0: HOSTED ON GITHUB PAGES, not the Supabase bucket — Supabase
     storage serves ALL HTML as text/plain + nosniff platform-wide
     (anti-phishing; verified 2026-07-11), so bucket-hosted HTML can
     never render. DECK_BASE is therefore ABSOLUTE (the bucket about/
     URL); v1.0.0 derived it from its own location, which only worked
     bucket-adjacent. Decks fetch cross-origin (public storage sends
     open CORS). Usage: slideshow.html?deck=<basename>.pdf — allowlisted. -->
<style>
  html,body{margin:0;height:100%;background:#101318;color:#dfe3ea;font-family:Arial,Helvetica,sans-serif;overflow:hidden}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{max-width:100vw;max-height:100vh;box-shadow:0 0 40px rgba(0,0,0,.6)}
  .hud{position:fixed;left:0;right:0;bottom:0;display:flex;align-items:center;gap:14px;
       padding:10px 16px;background:rgba(10,12,16,.82);opacity:0;transition:opacity .25s;z-index:5}
  body.hud-on .hud{opacity:1}
  .hud button{background:#1e3a5f;color:#fff;border:0;border-radius:5px;padding:9px 16px;
       font-size:14px;font-weight:bold;cursor:pointer}
  .hud button:disabled{opacity:.4;cursor:default}
  #pg{font-size:13.5px;color:#aeb6c2;min-width:90px}
  #fsbtn{margin-left:auto}
  #hint{position:fixed;top:14px;left:50%;transform:translateX(-50%);font-size:12.5px;
       color:#8b93a1;background:rgba(10,12,16,.7);padding:6px 12px;border-radius:5px;z-index:5;
       transition:opacity .4s}

  /* v1.2.0 — EXIT. Always visible, never in the fading HUD. Discreet, not hidden:
     a presenter must be able to SEE the way out without hunting for it. */
  #exit{position:fixed;top:12px;right:14px;z-index:7;display:flex;align-items:center;gap:7px;
        background:rgba(30,58,95,.86);color:#fff;border:1px solid rgba(255,255,255,.22);
        border-radius:6px;padding:8px 13px;font-size:13.5px;font-weight:bold;cursor:pointer;
        font-family:Arial,Helvetica,sans-serif;line-height:1;transition:background .15s}
  #exit:hover,#exit:focus{background:#1e3a5f;outline:none;border-color:rgba(255,255,255,.5)}
  #exit .x{font-size:15px;line-height:1}

  /* v1.2.0 — END CARD. Shown when the deck is advanced past its last slide. */
  #endcard{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
           flex-direction:column;gap:22px;text-align:center;padding:28px;z-index:6;
           background:#101318}
  #endcard.on{display:flex}
  #endtitle{font-size:26px;font-weight:bold;color:#fff;max-width:22ch;line-height:1.3}
  #endsub{font-size:14px;color:#8b93a1;margin-top:-10px}
  #endbtn{background:#1e3a5f;color:#fff;border:0;border-radius:8px;padding:17px 32px;
          font-size:18px;font-weight:bold;cursor:pointer;font-family:Arial,Helvetica,sans-serif}
  #endbtn:hover{background:#2a4f80}
  #endback{background:none;border:0;color:#9cc4ff;font-size:14px;cursor:pointer;
           font-family:Arial,Helvetica,sans-serif;text-decoration:underline}

  #err{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
       flex-direction:column;gap:14px;text-align:center;padding:24px;z-index:8;background:#101318}
  #err a{color:#9cc4ff}
  .zone{position:fixed;top:0;bottom:56px;width:34%;z-index:4;cursor:pointer}
  #zprev{left:0}#znext{right:0}
</style></head><body class="hud-on">
<div id="stage"><canvas id="cv"></canvas></div>
<div class="zone" id="zprev" title="Previous slide"></div>
<div class="zone" id="znext" title="Next slide"></div>

<button id="exit" title="Leave the slide show (Q)" aria-label="Exit the slide show"><span class="x">&#10005;</span> Exit</button>

<div id="hint">Click / tap right side or press &rarr; for next slide &middot; F for full screen &middot; Esc exits full screen</div>
<div class="hud">
  <button id="prev">&#8249; Prev</button>
  <button id="next">Next &#8250;</button>
  <span id="pg"></span>
  <button id="fsbtn">Full screen</button>
</div>

<div id="endcard">
  <div id="endtitle">End of deck</div>
  <div id="endsub">Thanks for watching.</div>
  <button id="endbtn">Return to ARvoters.com</button>
  <button id="endback">&#8592; to review slides</button>
</div>

<div id="err"><div id="errmsg">Couldn&rsquo;t load the slide deck.</div><a id="errlink" href="#">Open the PDF directly instead</a></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
(function(){
  "use strict";
  /* allowlist: about/ deck PDFs only. Value = the title the END CARD shows. */
  var DECKS = {
    "ARvoters_Explainer_Deck_Conway.pdf": "Conway &amp; the Data Center",
    "ARvoters_Technical_Deck.pdf":        "ARvoters — Technical Overview",
    "ARvoters_Legislator_Deck.pdf":       "ARvoters — For Legislators"
  };
  var BASE = "https://fbrssqcgqpwstibfdwkb.supabase.co/storage/v1/object/public/SpecialReports/about/";
  var HOME = "https://arvoters.com";
  var deck = new URLSearchParams(location.search).get("deck") || "";
  var errBox = document.getElementById("err"), errLink = document.getElementById("errlink");
  function fail(msg, url){
    document.getElementById("errmsg").textContent = msg;
    if (url) errLink.href = url; else errLink.style.display = "none";
    errBox.style.display = "flex";
  }
  if (!DECKS[deck]) { fail("Unknown deck requested.", null); return; }
  var URL_PDF = BASE + deck;
  errLink.href = URL_PDF;
  document.getElementById("endtitle").innerHTML = DECKS[deck];

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

  var doc = null, page = 1, total = 0, rendering = false, pending = 0;
  var cv = document.getElementById("cv"), ctx = cv.getContext("2d");
  var pgEl = document.getElementById("pg");
  var endCard = document.getElementById("endcard");

  /* ---- v1.2.0: leaving. Fullscreen FIRST, then navigate. -------------------
     Navigating while still fullscreen strands some browsers in a fullscreen
     window pointed at the new page, which is exactly the trap we are fixing.
     history.back() when we came from arvoters.com (keeps the visitor's scroll
     position); a direct URL otherwise — including when the deck was opened
     cold from a bookmark or a QR code, where there IS no back. */
  function leaveViewer(){
    var active = document.fullscreenElement || document.webkitFullscreenElement;
    function nav(){
      var from = document.referrer || "";
      if (from.indexOf(HOME) === 0) history.back();
      else location.href = HOME;
    }
    if (!active) { nav(); return; }
    try {
      var p = (document.exitFullscreen || document.webkitExitFullscreen).call(document);
      if (p && typeof p.then === "function") { p.then(nav)["catch"](nav); }
      else { setTimeout(nav, 120); }        /* webkit's exit is not promise-bound */
    } catch(e) { nav(); }
  }

  function showEnd(){ endCard.classList.add("on"); }
  function hideEnd(){ endCard.classList.remove("on"); }

  function render(n){
    if (!doc) return;
    if (rendering) { pending = n; return; }
    rendering = true;
    doc.getPage(n).then(function(p){
      var dpr = window.devicePixelRatio || 1;
      var v1 = p.getViewport({scale: 1});
      var scale = Math.min(window.innerWidth / v1.width, window.innerHeight / v1.height);
      var vp = p.getViewport({scale: scale * dpr});
      cv.width = vp.width; cv.height = vp.height;
      cv.style.width = (vp.width / dpr) + "px"; cv.style.height = (vp.height / dpr) + "px";
      return p.render({canvasContext: ctx, viewport: vp}).promise;
    }).then(function(){
      rendering = false;
      pgEl.textContent = "Slide " + page + " of " + total;
      document.getElementById("prev").disabled = page <= 1;
      /* NEXT is never disabled at the last slide any more — advancing off the end
         is how you REACH the end card. Dead air was the bug. */
      document.getElementById("next").disabled = false;
      if (pending) { var q = pending; pending = 0; render(q); }
    }).catch(function(){ rendering = false; fail("This slide failed to render.", URL_PDF); });
  }

  function go(n){
    if (!doc) return;
    if (n > total) { showEnd(); return; }          /* past the last slide -> end card */
    hideEnd();
    n = Math.max(1, Math.min(total, n));
    if (n !== page){ page = n; render(page); }
  }

  pdfjsLib.getDocument({url: URL_PDF}).promise.then(function(d){
    doc = d; total = d.numPages; render(page);
  }).catch(function(){ fail("Couldn't load the slide deck.", URL_PDF); });

  document.getElementById("prev").addEventListener("click", function(){ go(page-1); });
  document.getElementById("next").addEventListener("click", function(){ go(page+1); });
  document.getElementById("zprev").addEventListener("click", function(){ go(page-1); });
  document.getElementById("znext").addEventListener("click", function(){ go(page+1); });

  document.getElementById("exit").addEventListener("click", leaveViewer);
  document.getElementById("endbtn").addEventListener("click", leaveViewer);
  document.getElementById("endback").addEventListener("click", function(){ hideEnd(); go(total); });

  window.addEventListener("keydown", function(e){
    /* Esc is NOT intercepted: it is the browser's native fullscreen exit and every
       presenter already trusts it. Taking it over would be the worse bug. */
    if (endCard.classList.contains("on")) {
      if (e.key === "ArrowLeft" || e.key === "PageUp") { e.preventDefault(); hideEnd(); go(total); return; }
      if (e.key === "q" || e.key === "Q" || e.key === "Enter") { e.preventDefault(); leaveViewer(); return; }
    }
    if (e.key === "ArrowRight" || e.key === "PageDown" || e.key === " ") { e.preventDefault(); go(page+1); }
    else if (e.key === "ArrowLeft" || e.key === "PageUp") { e.preventDefault(); go(page-1); }
    else if (e.key === "Home") go(1);
    else if (e.key === "End") go(total);
    else if (e.key === "f" || e.key === "F") toggleFS();
    else if (e.key === "q" || e.key === "Q") leaveViewer();
  });
  window.addEventListener("resize", function(){ render(page); });

  /* Fullscreen — standard + webkit prefix (Mac Safari). Own-tab context, so
     no iframe grant problem. If unsupported (iPhone), hide the button —
     the page is already chromeless full-window. */
  var fsBtn = document.getElementById("fsbtn");
  var fsOK = document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen;
  if (!fsOK) fsBtn.style.display = "none";
  function toggleFS(){
    var el = document.documentElement;
    var active = document.fullscreenElement || document.webkitFullscreenElement;
    try {
      if (active) { (document.exitFullscreen || document.webkitExitFullscreen).call(document); }
      else { (el.requestFullscreen || el.webkitRequestFullscreen).call(el); }
    } catch(e) {}
  }
  fsBtn.addEventListener("click", toggleFS);

  /* HUD + hint fade: hide after 3s idle, reappear on mouse/touch.
     The EXIT control is deliberately OUTSIDE this — it never fades. */
  var t = null, hint = document.getElementById("hint");
  function wake(){
    document.body.classList.add("hud-on");
    clearTimeout(t);
    t = setTimeout(function(){ document.body.classList.remove("hud-on"); hint.style.opacity = "0"; }, 3000);
  }
  ["mousemove","touchstart","keydown"].forEach(function(ev){ window.addEventListener(ev, wake, {passive:true}); });
  wake();
})();
</script></body></html>
